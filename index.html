<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advertencia QR</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding: 50px;
        }

        img {
            max-width: 200px;
        }

        h1 {
            color: #ff0000;
            font-size: 2.5em;
            margin-top: 20px;
        }

        p {
            font-size: 1.5em;
            color: #333;
        }

        .warning-image {
            max-width: 400px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <!-- Sustituye la URL del logo con la ruta correcta -->
    <img src="https://www.chevyplan.com.ec/wp-content/uploads/2024/08/wb_chevyplan_logo-solucion_v2@2x.png" alt="Logo Chevyplan">
    
    <h1>¡Advertencia!</h1>
    <p>No deberías escanear un QR desconocido.</p>

    <!-- Imagen añadida -->
    <img class="warning-image" src="https://img.freepik.com/vector-gratis/panico-empleado-hombre-dibujos-animados-portatil-concepto-icono-tecnologia-personas-aislado-estilo-dibujos-animados-plana_138676-2201.jpg?t=st=1726715877~exp=1726719477~hmac=e2776009daed4fe3ea6bb2a42f5e5248d22cdea1c0cfde746f3da1c6f1710ef0&w=1380" alt="Imagen de advertencia">
</body>
</html>
